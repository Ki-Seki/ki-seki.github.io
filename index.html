<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link rel="shortcut icon" href="./assets/favicon.ico" />
    <title>SSC ❤ CJY</title>
    <style>
        body {
            background-image: url(./assets/bg.jpg);
            background-size: initial;
            background-color: #003770;
            width: 350px;
            text-align: center;
            margin: auto;
            margin-top: 100px;
        }

        #content {
            color: white;
        }

        #counter {
            height: 60px;
            margin: auto;
            width: 350px;
            font-family: serif;
        }

        #number {
            float: left;
            font-size: 50px;
            width: 190px;
            text-align: right;
        }

        #suffix {
            float: left;
            margin-top: 30px;
            width: 160px;
            text-align: left;
        }

        img {
            width: 100%;
        }

        #footer {
            font-size: 14px;
            font-weight: 100;
            position: fixed;
            bottom: 30px;
            text-align: center;
            text-shadow: 0 0 40px rgb(255, 183, 0);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            border: 1px solid white;
            left: calc(50% - 27.71px);  /* 需根据最终大小调整数据 */
        }

        #footer a {
            color: white;
        }

        #footer a:link, a:visited {
            text-decoration:none;
        }

        #footer a:hover, a:active {
            text-decoration:underline;
        }
    </style>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.3/jquery.js"></script>
</head>
<body>
    <div id="content">
        <div id="counter">
            <div id="number"> Error. </div>
            <div id="suffix"> Error. </div>
        </div>
        <div id="subtitle">
            day since <br>
            Ms Cui & Mr Song <br>
            fell in love on <br>
            August 4, 2022.
        </div>
    </div>
    <img src="./assets/sticker.png">
    <div id="footer">
        <a href="./list.html"> More </a>
    </div>
    <script>
        // 事件处理
        urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('event')) {
            event = urlParams.get('event');
            eval(event+'(Date.now(), true)');
        }
        else
            event230101();

        // 运行天数
        var days = getRunningDays();
        document.getElementById("number").innerHTML = days;
        document.getElementById("suffix").innerHTML = getSuffix(days);

        // 运行天数显示样式
        var len = String(days).length;
        if (len > 2)
        {
            var bias = (len - 2) * 15;  // 计算偏置量，平衡视觉效果
            document.getElementById("number").style.width = 185 + bias + "px";
            document.getElementById("suffix").style.width = 165 - bias + "px";
        }

        // Event Happy New Year
        function event230101 (now=Date.now(), specialJudge=false) {
            timeDiff = now - new Date(2023, 1 - 1, 1).getTime()
            if (0 <= timeDiff && timeDiff <= 24 * 60 * 60 * 1000 || specialJudge) {
                $("img").attr('src', './assets/Happy New Year.png');
                console.log('Succeeded!');
            }
        }

        function getRunningDays() {
            var start = new Date(2022, 8 - 1, 4, 0, 0, 0, 0).getTime();
            var end = Date.now();
            return runningDays = Math.ceil((end - start) / (24 * 3600 * 1000));
        }

        function getSuffix(days) {
            days = Math.abs(days);
            if (11 <= days % 100 && days % 100 < 20) return "th.";
            var suffixs = {0: "th.", 1: "st.", 2: "nd.", 3: "rd."};
            if (days % 10 < 4) return suffixs[days % 10];
            else return suffixs[0];
        }
    </script>
</body>
</html>
