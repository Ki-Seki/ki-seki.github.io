{{- /* Translate button — styled to match PaperMod's go-to-top button */ -}}
<div id="translate-widget" hidden>
  <button id="translate-btn" aria-label="Translate this page" aria-haspopup="listbox"
    aria-expanded="false" aria-controls="translate-menu" title="Translate this page">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
  </button>
  <ul id="translate-menu" role="listbox" aria-label="Select language" hidden>
    <li><a data-lang="en">English</a></li>
    <li><a data-lang="zh-CN">中文 (Chinese)</a></li>
    <li><a data-lang="ja">日本語 (Japanese)</a></li>
    <li><a data-lang="ko">한국어 (Korean)</a></li>
    <li><a data-lang="fr">Français (French)</a></li>
    <li><a data-lang="de">Deutsch (German)</a></li>
    <li><a data-lang="es">Español (Spanish)</a></li>
    <li><a data-lang="pt">Português (Portuguese)</a></li>
    <li><a data-lang="ru">Русский (Russian)</a></li>
    <li><a data-lang="ar">العربية (Arabic)</a></li>
  </ul>
</div>

<style>
  /* Position just above the go-to-top button (bottom: 60px + 42px height + 10px gap) */
  #translate-widget {
    position: fixed;
    bottom: 112px;
    right: 30px;
    z-index: 99;
  }

  /* Mirror .top-link exactly: same size, background, padding, border-radius, color */
  #translate-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    padding: 12px;
    border: 0;
    border-radius: 64px;
    background: var(--tertiary);
    color: var(--secondary);
    cursor: pointer;
    filter: drop-shadow(0px 0px 0px var(--theme));
    transition: color 0.5s;
  }

  #translate-btn:hover {
    color: var(--primary);
  }

  #translate-btn:focus-visible {
    color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary);
    outline: none;
  }

  #translate-btn svg {
    filter: drop-shadow(0px 0px 0px var(--theme));
  }

  #translate-menu {
    position: absolute;
    bottom: calc(100% + 0.5rem);
    right: 0;
    list-style: none;
    margin: 0;
    background: var(--theme);
    border: 1px solid var(--border);
    border-radius: var(--radius, 8px);
    padding: 0.35rem 0;
    min-width: 200px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    font-size: 12px;
  }

  #translate-menu a {
    display: block;
    padding: 0.45rem 1rem;
    color: var(--secondary);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s ease, background-color 0.15s ease;
  }

  #translate-menu a:hover {
    color: var(--primary);
    background-color: var(--code-bg);
  }

  #translate-menu a:focus-visible {
    color: var(--primary);
    background-color: var(--code-bg);
    outline: 2px solid var(--primary);
    outline-offset: -2px;
  }

  /* Match .list .top-link responsive offset from PaperMod */
  @media screen and (max-width: 900px) {
    .list #translate-widget {
      transform: translateY(-5rem);
    }
  }
</style>

<script>
  (function () {
    var widget = document.getElementById('translate-widget');
    var btn = document.getElementById('translate-btn');
    var menu = document.getElementById('translate-menu');

    // Only show widget when the page URL is http(s) — hides the button on
    // local file:// previews where translate links can't be built.
    var pageURL = /^https?:\/\//.test(window.location.href)
      ? window.location.href
      : '';
    if (!pageURL) { return; }

    // Build hrefs once on load; verify protocol to guard against unexpected
    // URL schemes (e.g. javascript:) being passed to the translate URL.
    menu.querySelectorAll('a[data-lang]').forEach(function (a) {
      a.href = 'https://translate.google.com/translate?sl=auto&tl='
        + encodeURIComponent(a.dataset.lang)
        + '&u=' + encodeURIComponent(pageURL);
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    });

    widget.hidden = false;

    function openMenu() {
      menu.hidden = false;
      btn.setAttribute('aria-expanded', 'true');
    }

    function closeMenu() {
      menu.hidden = true;
      btn.setAttribute('aria-expanded', 'false');
    }

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      menu.hidden ? openMenu() : closeMenu();
    });

    document.addEventListener('click', function () {
      if (!menu.hidden) closeMenu();
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && !menu.hidden) closeMenu();
    });
  })();
</script>
