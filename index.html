<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ki-seki.site</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        body {
            background-image: url(./bg.jpg);
            /* background-size: contain; */
            background-size: initial cover;
            width: 350px;
            text-align: center;
            margin: auto;
            margin-top: 100px;
        }

        #content {
            color: white;
            
        }

        #counter {
            height: 60px;
            margin: auto;
            width: 350px;
            font-family: serif;
        }

        #number {
            float: left;
            font-size: 50px;
            font-family: monospace;
            width: 190px;
            text-align: right;
        }

        #suffix {
            float: left;
            margin-top: 30px;
            width: 160px;
            text-align: left;
        }

        img {
            width: 100%;
        }

        #footer {
            font-size: 14px;
            font-weight: 100;
            position: fixed;
            bottom: 30px;
            text-align: center;
            text-shadow: 0 0 40px rgb(255, 183, 0);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            border: 1px solid white;
            left: calc(50% - 33.25px);  /* 需根据最终大小调整数据 */
        }

        #footer a {
            color: white;
        }

        #footer a:link, a:visited {
            text-decoration:none;
        }

        #footer a:hover, a:active {
            text-decoration:underline;
        }
    </style>
</head>
<body>
    <div id="content" class="animate__animated animate__jello">
        <div id="counter">
            <div id="number"> Error. </div>
            <div id="suffix"> Error. </div>
        </div>
        <div id="subtitle">
            day since Ms Cui & Mr Song fell in love on <br>
            August 4, 2021.
        </div>
    </div>
    <img src="./sticker.png">
    <div id="footer" class="animate__animated animate__jello">
        <a href="https://github.com/Ki-Seki/ki-seki.github.io"> More </a>
    </div>
    <script>
        // 运行天数
        var days = getRunningDays();
        document.getElementById("number").innerHTML = days;
        document.getElementById("suffix").innerHTML = getSuffix(days);

        // 运行天数显示样式
        var len = String(days).length;
        if (len > 2)
        {
            var bias = (len - 2) * 15;  // 计算偏置量，平衡视觉效果
            document.getElementById("number").style.width = 185 + bias + "px";
            document.getElementById("suffix").style.width = 165 - bias + "px";
        }

        function getRunningDays() {
            var start = new Date(2022, 8 - 1, 4, 0, 0, 0, 0).getTime();
            var end = Date.now();
            return runningDays = Math.ceil((end - start) / (24 * 3600 * 1000));
        }

        function getSuffix(days) {
            days = Math.abs(days);
            if (11 <= days % 100 && days % 100 < 20) return "th.";
            var suffixs = {0: "th.", 1: "st.", 2: "nd.", 3: "rd."};
            if (days % 10 < 4) return suffixs[days % 10];
            else return suffixs[0];
        }
    </script>
</body>
</html>
