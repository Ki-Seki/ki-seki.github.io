<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouroboros</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
            color: #333;
            margin-bottom: 2rem;
        }
        p {
            font-size: 1.2rem;
            font-weight: 300;
            color: #666;
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            text-decoration: none;
            color: #333;
            border: 1px solid #333;
            padding: 10px 30px;
            font-size: 1rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        a:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ouroboros</h1>
        <p>A self-modifying, infinite canvas workspace where code evolves itself.</p>
        <a href="app.html">Enter</a>
    </div>
</body>
</html>
